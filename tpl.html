<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Demo Bootstrap</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="#">MyWebsite</a>

        <button
          class="navbar-toggler"
          data-bs-toggle="collapse"
          data-bs-target="#menu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link active" href="#">Trang chủ</a>
            </li>
            <li class="nav-item"><a class="nav-link" href="#">Sản phẩm</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Liên hệ</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- CONTAINER -->
    <div class="container mt-4">
      <!-- BUTTON -->
      <h3>Button</h3>
      <button class="btn btn-primary">Primary</button>
      <button class="btn btn-success">Success</button>
      <button class="btn btn-danger">Danger</button>

      <!-- GRID -->
      <h3 class="mt-4">Grid (Row / Column)</h3>
      <div class="row">
        <div class="col-md-4 bg-light p-3 border">Cột 1</div>
        <div class="col-md-4 bg-secondary text-white p-3 border">Cột 2</div>
        <div class="col-md-4 bg-light p-3 border">Cột 3</div>
      </div>

      <!-- IMAGE -->
      <h3 class="mt-4">Image</h3>
      <img
        src="https://via.placeholder.com/300"
        class="img-fluid rounded"
        alt="image"
      />

      <!-- FIGURE -->
      <h3 class="mt-4">Figure</h3>
      <figure class="figure">
        <img
          src="https://via.placeholder.com/300"
          class="figure-img img-fluid rounded"
          alt=""
        />
        <figcaption class="figure-caption">
          Đây là chú thích hình ảnh
        </figcaption>
      </figure>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
