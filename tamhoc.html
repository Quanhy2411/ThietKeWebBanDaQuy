<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Slider Sapphire</title>

    <style>
      body {
        margin: 0;
        font-family: Arial;
      }

      /* SECTION */
      .section {
        background: #8d99a6;
        padding: 40px 20px;
        color: white;
        text-align: center;
      }

      /* SLIDER */
      .slider {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        margin-bottom: 20px;
      }

      /* BUTTON */
      .btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: none;
        background: rgba(255, 255, 255, 0.2);
        color: white;
        font-size: 20px;
        cursor: pointer;
      }

      /* ITEMS */
      .items {
        display: flex;
        gap: 20px;
        overflow: hidden;
        max-width: 600px;
      }

      .item {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0.5;
        transition: 0.3s;
        cursor: pointer;
      }

      .item img {
        width: 80px;
        height: 80px;
        object-fit: cover;
        border-radius: 50%;
      }

      .item.active {
        opacity: 1;
        transform: scale(1.1);
      }

      /* TEXT */
      .content {
        max-width: 800px;
        margin: 0 auto;
        display: flex;
        gap: 20px;
        align-items: flex-start;
      }

      .title {
        font-weight: bold;
        min-width: 120px;
      }

      .desc {
        text-align: left;
        line-height: 1.5;
      }
    </style>
  </head>

  <body>
    <div class="section">
      <div class="slider">
        <button class="btn" onclick="prev()">❮</button>

        <div class="items" id="items"></div>

        <button class="btn" onclick="next()">❯</button>
      </div>

      <div class="content">
        <div class="title" id="title">Sapphire</div>
        <div class="desc" id="desc"></div>
      </div>
    </div>

    <script>
      const data = [
        {
          name: "Sapphire",
          img: "image/.DaQuy/.GNCTXMY000209.png/",
          desc: "Đá Sapphire có tên Hy Lạp là Sappheiros...",
        },
        {
          name: "Topaz",
          img: "https://i.imgur.com/2.jpg",
          desc: "Topaz là loại đá quý phổ biến...",
        },
        {
          name: "Diamond",
          img: "https://i.imgur.com/3.jpg",
          desc: "Kim cương là vật liệu cứng nhất...",
        },
        {
          name: "Rose",
          img: "https://i.imgur.com/4.jpg",
          desc: "Đá màu hồng mang ý nghĩa tình yêu...",
        },
        {
          name: "Ruby",
          img: "https://i.imgur.com/5.jpg",
          desc: "Ruby tượng trưng cho quyền lực...",
        },
      ];

      let current = 0;
      const itemsDiv = document.getElementById("items");

      function render() {
        itemsDiv.innerHTML = "";

        data.forEach((item, index) => {
          const div = document.createElement("div");
          div.className = "item " + (index === current ? "active" : "");
          div.innerHTML = `<img src="${item.img}">`;

          div.onclick = () => {
            current = index;
            update();
          };

          itemsDiv.appendChild(div);
        });

        updateText();
      }

      function update() {
        render();
      }

      function updateText() {
        document.getElementById("title").innerText = data[current].name;
        document.getElementById("desc").innerText = data[current].desc;
      }

      function next() {
        current = (current + 1) % data.length;
        update();
      }

      function prev() {
        current = (current - 1 + data.length) % data.length;
        update();
      }

      render();
    </script>
  </body>
</html>
