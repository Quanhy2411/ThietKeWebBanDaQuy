<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Đăng ký tài khoản - TPL Jewelry</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .register-box {
        background: #fff;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        width: 350px;
      }
      .register-box h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
      }
      .register-box input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      .register-box button {
        width: 100%;
        padding: 10px;
        background: #007bff;
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        margin-top: 10px;
      }
      .register-box button:hover {
        background: #0056b3;
      }
      .switch {
        text-align: center;
        margin-top: 15px;
      }
      .switch a {
        color: #007bff;
        cursor: pointer;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="register-box">
      <h2>Đăng ký tài khoản</h2>
      <form id="registerForm">
        <input type="text" id="regUser" placeholder="Tên đăng nhập" required />
        <input type="email" id="regEmail" placeholder="Email" required />
        <input type="password" id="regPass" placeholder="Mật khẩu" required />
        <button type="submit">Đăng ký</button>
      </form>
      <div class="switch">
        Đã có tài khoản? <a href="login.html">Đăng nhập</a>
      </div>
    </div>

    <script>
      document
        .getElementById("registerForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const user = document.getElementById("regUser").value;
          const email = document.getElementById("regEmail").value;
          const pass = document.getElementById("regPass").value;

          // Demo: chỉ hiển thị thông báo, thực tế cần lưu vào DB
          alert("Đăng ký thành công cho " + user + " (" + email + ")");
          // Sau khi đăng ký, chuyển về trang login
          window.location.href = "login.html";
        });
    </script>
  </body>
</html>
