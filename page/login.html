<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - TPL Jewelry</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --gold: #d4af37;
        --dark: #1a1a1a;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: "Inconsolata", monospace;
        background: #fdfdfd;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .login-container {
        width: 100%;
        max-width: 400px;
        padding: 40px;
        background: white;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        border-radius: 8px;
        text-align: center;
      }

      .login-container img {
        width: 100px;
        margin-bottom: 20px;
      }

      .login-container h2 {
        color: var(--gold);
        margin-bottom: 30px;
        text-transform: uppercase;
        letter-spacing: 2px;
      }

      .form-group {
        margin-bottom: 20px;
        text-align: left;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #555;
        font-weight: bold;
      }

      .form-group input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box; /* Quan trọng để input không bị tràn */
        transition: border-color 0.3s;
      }

      .form-group input:focus {
        outline: none;
        border-color: var(--gold);
      }

      .btn-login {
        width: 100%;
        padding: 14px;
        background: var(--dark);
        color: var(--gold);
        border: 1px solid var(--gold);
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        font-size: 16px;
        transition: all 0.3s;
        margin-top: 10px;
      }

      .btn-login:hover {
        background: var(--gold);
        color: white;
      }

      .extra-links {
        margin-top: 20px;
        font-size: 14px;
      }

      .extra-links a {
        color: var(--dark);
        text-decoration: none;
        transition: color 0.3s;
      }

      .extra-links a:hover {
        color: var(--gold);
      }

      .back-home {
        display: block;
        margin-top: 15px;
        font-size: 13px;
        color: #888;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <a href="../index.html">
        <img src="../images/logo.png" alt="TPL Jewelry" />
      </a>
      <h2>Đăng Nhập</h2>

      <form action="auth.php" method="POST">
        <input type="hidden" name="action" value="login" />

        <div class="form-group">
          <label for="email">Email đăng nhập</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Nhập email của bạn"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Nhập mật khẩu"
            required
          />
        </div>

        <button type="submit" class="btn-login">ĐĂNG NHẬP</button>
      </form>

      <div class="extra-links">
        <a href="#">Quên mật khẩu?</a> |
        <a href="register.html">Đăng ký tài khoản</a>
      </div>

      <a href="../index.html" class="back-home">← Quay lại trang chủ</a>
    </div>
  </body>
</html>
