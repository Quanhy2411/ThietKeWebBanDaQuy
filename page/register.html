<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký - TPL Jewelry</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --gold: #d4af37;
        --dark: #1a1a1a;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: "Inconsolata", monospace;
        background: #fdfdfd;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .register-container {
        width: 100%;
        max-width: 400px;
        padding: 40px;
        background: white;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        border-radius: 8px;
        text-align: center;
        margin: 20px;
      }

      .register-container img {
        width: 80px;
        margin-bottom: 20px;
      }

      .register-container h2 {
        color: var(--gold);
        margin-bottom: 25px;
        text-transform: uppercase;
        letter-spacing: 2px;
        font-size: 24px;
      }

      .form-group {
        margin-bottom: 15px;
        text-align: left;
      }

      .form-group label {
        display: block;
        margin-bottom: 5px;
        color: #555;
        font-size: 14px;
      }

      .form-group input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
        transition: border-color 0.3s;
      }

      .form-group input:focus {
        outline: none;
        border-color: var(--gold);
      }

      .btn-register {
        width: 100%;
        padding: 14px;
        background: var(--dark);
        color: var(--gold);
        border: 1px solid var(--gold);
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        font-size: 16px;
        transition: all 0.3s;
        margin-top: 15px;
      }

      .btn-register:hover {
        background: var(--gold);
        color: white;
      }

      .extra-links {
        margin-top: 20px;
        font-size: 14px;
      }

      .extra-links a {
        color: var(--dark);
        text-decoration: none;
        font-weight: bold;
      }

      .extra-links a:hover {
        color: var(--gold);
      }
    </style>
  </head>
  <body>
    <div class="register-container">
      <a href="../index.html">
        <img src="../images/logo.png" alt="TPL Jewelry" />
      </a>
      <h2>Tạo Tài Khoản</h2>

      <form action="auth.php" method="POST">
        <input type="hidden" name="action" value="register" />

        <div class="form-group">
          <label for="fName">Họ và Tên</label>
          <input
            type="text"
            id="fName"
            name="fName"
            placeholder="Nhập tên của bạn"
            required
          />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="example@gmail.com"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Tối thiểu 6 ký tự"
            required
          />
        </div>

        <button type="submit" class="btn-register">ĐĂNG KÝ NGAY</button>
      </form>

      <div class="extra-links">
        Đã có tài khoản? <a href="login.html">Đăng nhập</a>
      </div>
    </div>
  </body>
</html>
